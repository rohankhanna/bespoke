name: data-branch-heartbeat

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  write_data_branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch or create data branch
        run: |
          git fetch origin data:data || true
          if git show-ref --verify --quiet refs/heads/data; then
            git checkout data
          else
            git checkout --orphan data
            git rm -rf . >/dev/null 2>&1 || true
          fi

      - name: Write hourly proof artifact
        run: |
          mkdir -p ci
          {
            echo "data-branch-heartbeat"
            echo "source_workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "trigger_ref=${GITHUB_REF}"
            echo "updated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > ci/hourly-data-proof.txt

      - name: Commit and push data branch update
        run: |
          git add ci/hourly-data-proof.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "ci: update hourly data branch proof"
          git push origin HEAD:data
